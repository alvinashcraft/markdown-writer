<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Writer</title>
    <style>
      /* Inline splash — visible until React mounts and replaces #root contents */
      .splash{display:flex;flex-direction:column;align-items:center;justify-content:center;
        height:100vh;background:#2d3748;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
      .splash h1{font-size:1.5rem;font-weight:600;margin-bottom:1rem}
      .splash .spinner{width:28px;height:28px;border:3px solid #4a5568;border-top-color:#63b3ed;
        border-radius:50%;animation:spin .8s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="root">
      <div class="splash"><h1>Markdown Writer</h1><div class="spinner"></div></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
